<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Work</title>
    <style>
        div{
            margin-bottom: 20px;
            text-align: center;
        }
        label{
            display: block;
            color:deeppink;
        }
        input{
            width: 90%
            padding="10px"
        }
        input[type="submit"]{
            width: 40%;
            background-color: aqua;
        }
    </style>
</head>
<body style="display:flex; justify-content: center;">
    <form action="" style="width: 50%; border: 5px solid;">
        <div>
            <label for"">Full Name</label>
            <input type="text" placeholder="Full Name here">
        </div>
        <div>
            <label for="">UserName</label>
            <input type="text" placeholder="User Name here">
        </div>
        <div>
            <label for="">Password</label>
            <input type="password">
        </div>
        <div>
            <input type="submit">
        </div>
    </form>
    
</body>
</html>
