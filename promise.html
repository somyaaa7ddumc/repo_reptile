<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let promise= new Promise((resolve,reject) => {
            let weight= 70;
            if(weight>60) {
                resolve("obese");
            }
            else{
                reject("healthy");
            }
        });
            promise.then((weight)=>{
                console.log(weight)
            }).catch((err)=> {
                console.log(err)
            });
    </script>
</body>
</html>
