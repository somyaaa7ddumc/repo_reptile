<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let promise= new Promise((resolve,reject) => {
            let number= 75;
            if(number%2==0) {
                resolve("even");
            }
            else{
                reject("odd");
            }
        });
            promise.then((number)=>{
                console.log(number)
            }).catch((err)=> {
                console.log(err)
            });
    </script>
</body>
</html>
